# KJV Bible Reader Configuration
server.port=8080

# Trust reverse proxy headers (Nginx SSL termination → HTTPS redirects)
server.forward-headers-strategy=native

# Serve static resources
spring.web.resources.static-locations=classpath:/static/

# JSON configuration
spring.jackson.serialization.indent-output=false

# TTS Configuration
tts.enabled=true
tts.api-key=${OPENAI_API_KEY:}
tts.voice=onyx
tts.model=tts-1-hd
tts.prefetch-count=10

# Verse of the Day (AI-generated via OpenAI, daily at midnight UTC)
# Reuses tts.api-key (${OPENAI_API_KEY}) — no additional key needed
votd.enabled=${VOTD_ENABLED:true}
votd.model=${VOTD_MODEL:gpt-4o-mini}

# Digital Ocean Spaces Configuration
spaces.enabled=true
spaces.endpoint=https://nyc3.digitaloceanspaces.com
spaces.bucket=readthekjv
spaces.cdn-url=https://readthekjv.nyc3.cdn.digitaloceanspaces.com
spaces.access-key=${DO_SPACES_ACCESS_KEY:}
spaces.secret-key=${DO_SPACES_SECRET_KEY:}
spaces.audio-prefix=audio

# PostgreSQL
spring.datasource.url=jdbc:postgresql://${KJV_DB_HOST:localhost}:${KJV_DB_PORT:5432}/${KJV_DB_NAME:readthekjv}
spring.datasource.username=${KJV_DB_USERNAME:kevinturner}
spring.datasource.password=${KJV_DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.pool-name=BibleReaderPool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway
# Disabled on production (PostgreSQL 9.5 incompatibility) — run migrations manually
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true

# X (Twitter) daily verse posting — noon UTC (7 AM Eastern)
x.enabled=${X_ENABLED:true}
x.api-key=${X_API_KEY:}
x.api-secret=${X_API_SECRET:}
x.access-token=${X_ACCESS_TOKEN:}
x.access-token-secret=${X_ACCESS_TOKEN_SECRET:}
# Base URL for deep links in tweets (reuses APP_BASE_URL env var)
app.base-url=${APP_BASE_URL:https://readthekjv.com}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dev-placeholder}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dev-placeholder}
spring.security.oauth2.client.registration.google.scope=email,profile
# Explicit redirect URI so Spring doesn't construct it with http:// behind Nginx SSL termination
spring.security.oauth2.client.registration.google.redirect-uri=${APP_BASE_URL:http://localhost:8080}/login/oauth2/code/google
